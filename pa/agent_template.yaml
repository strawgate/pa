# agent.yaml -- written by `pa init`. Edit freely.
#
# This file is user-owned configuration. pa's built-in operating instructions
# are provided by the package at runtime; use the `instructions` field below for
# project-specific preferences, tone, and workflows.
#
# `sdk` tells pydantic-ai which SDK/protocol to use (anthropic, openai, groq,
# google-cloud). `base_url` can point directly at a provider API.
model: MiniMax-M2.7-highspeed
sdk: anthropic
base_url: https://api.minimax.io/anthropic
name: pa-agent
instructions: |
  You are pa, a self-evolving agent working in this project.
  Follow the user's instructions, use the project context, and keep durable
  self-improvements small, tested, and easy to inspect.
capabilities:
  - CodeMode: {max_retries: 15, tools: [read_file, write_file, list_dir, bash, http_get, complete]}
  - PaRegistrations: {}
